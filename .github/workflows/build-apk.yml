name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger manually from GitHub's Actions tab

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix SDK env conflict (align ANDROID_SDK_ROOT with ANDROID_HOME)
        run: echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install npm dependencies
        run: npm ci

      - name: Build Next.js static export (mobile)
        run: npm run build:mobile

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: StitchDesk-v1.0.0
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
